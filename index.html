          <label>Jugador</label>
          <select id="cat-dash-select" onchange="catDashSelectedId=this.value;renderCategorias()" ${!catDashTeam?'disabled':''}>
            <option value="">${catDashTeam ? 'Todos los jugadores' : 'Selecciona un equipo...'}</option>
            ${filtered.map(p => `<option value="${p.id}" ${p.id===selectedId?'selected':''}>${p.player_name}${isRomo(p.team_name)?' ⭐':''}</option>`).join('')}
          </select>
        </div>
        <button class="btn secondary" onclick="catDashTeam='';catDashPlayerSearch='';catDashMis=false;catDashSelectedId='';renderCategorias()">Limpiar</button>
      </div>
      ${dashHtml}`;

    makeSearchable('cat-dash-team');
    makeSearchable('cat-dash-select');
    setupFilterToggles();
    if (window._dashChartData) {
      setTimeout(() => {
        const cd = window._dashChartData;
        if (!cd) return;
        const donutCanvas = document.getElementById('dash-donut-chart');
        if (donutCanvas && typeof Chart !== 'undefined') {
          if (donutCanvas._chart) donutCanvas._chart.destroy();
          donutCanvas._chart = new Chart(donutCanvas, {
            type: 'doughnut',
            data: {
              datasets: [{
                data: [cd.donut.starters, cd.donut.subs, cd.donut.noPlayed],
                backgroundColor: [cd.donut.accent, '#93C5FD', '#E5E7EB'],
                borderWidth: 0,
                hoverOffset: 4
              }]
            },
            options: {
              cutout: '70%',
              plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ['Titular','Suplente','No jugó'][ctx.dataIndex]+': '+ctx.raw } } }
            }
          });
        }
        const minCanvas = document.getElementById('dash-minutes-chart');
        if (minCanvas && typeof Chart !== 'undefined') {
          if (minCanvas._chart) minCanvas._chart.destroy();
          minCanvas._chart = new Chart(minCanvas, {
            type: 'bar',
            data: {
              labels: cd.minutes.labels,
              datasets: [{
                label: 'Minutos',
                data: cd.minutes.data,
                backgroundColor: cd.minutes.isStarter.map(s => s ? cd.minutes.accent : '#93C5FD'),
                borderRadius: 3
              }]
            },
            options: {
              plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.raw+"'" } } },
              scales: {
                y: { beginAtZero: true, max: 90, ticks: { font: { size: 10 } } },
                x: { ticks: { font: { size: 9 }, maxRotation: 45 } }
              }
            }
          });
        }
        window._dashChartData = null;
      }, 50);
    }

    // Restaurar el foco en el buscador de jugador tras el re-render
    if (catDashFocus) {
      const si = document.getElementById('cat-dash-search');
      if (si) { si.focus(); si.setSelectionRange(si.value.length, si.value.length); }
      catDashFocus = false;
    }
    return;
  }

  if (catSubTab === 'graficas') {
    const escG = (s) => String(s).replace(/"/g, '&quot;');
    const grafTeamNames = [...new Set(standings.map(s => s.team_name).filter(Boolean))].sort((a,b) => a.localeCompare(b));

    // Inicializar con Romo si aún no hay selección o si el equipo no está en esta competición
    if (!catGrafTeam || !grafTeamNames.includes(catGrafTeam)) {
      catGrafTeam = grafTeamNames.find(n => isRomo(n)) || '';
    }

    // Filtrar partidos por equipo si está seleccionado
    const grafResults = catGrafTeam
      ? results.filter(m => m.home_team_name === catGrafTeam || m.away_team_name === catGrafTeam)
      : results;

    el.innerHTML = summaryHtml + `
      <div class="filter-bar" style="margin-bottom:16px">
        <div class="filter-group wide">
          <label>Equipo</label>
          <select id="cat-graf-team" onchange="catGrafTeam=this.value;renderCategorias()">
            <option value="">Todos los equipos</option>
            ${grafTeamNames.map(n => `<option value="${escG(n)}" ${n===catGrafTeam?'selected':''}>${n}</option>`).join('')}
          </select>
        </div>
        <button class="btn" onclick="renderCategorias()" title="Buscar">&#128269;</button>
        ${catGrafTeam ? `<button class="btn secondary" onclick="catGrafTeam='';renderCategorias()">Limpiar</button>` : ''}
      </div>
      <div class="charts-grid" id="cat-charts-container">
        <div class="chart-card"><h3>Goles por jornada</h3><p>${catGrafTeam ? 'Goles a favor y en contra por jornada' : 'Goles marcados por jornada'} · <em>click para filtrar</em></p><canvas id="cat-ch-goals-0"></canvas><div class="chart-drill-table" id="drill-cat-goals"></div></div>
        <div class="chart-card"><h3>Distribución de resultados</h3><p>${catGrafTeam ? `Resultados de ${catGrafTeam}` : 'Victorias locales, empates y visitantes'}</p><canvas id="cat-ch-results-0"></canvas></div>
        <div class="chart-card"><h3>Top goleadores</h3><p>${catGrafTeam ? `Goleadores de ${catGrafTeam}` : 'Goles por jugador (excl. p.p.) — Romo en amarillo'} · <em>click para filtrar</em></p><canvas id="cat-ch-scorers-0"></canvas><div class="chart-drill-table" id="drill-cat-scorers"></div></div>
        <div class="chart-card"><h3>Goles por minuto</h3><p>${catGrafTeam ? `Goles en partidos de ${catGrafTeam}` : 'Distribución a lo largo del partido'} · <em>click para filtrar</em></p><canvas id="cat-ch-min-0"></canvas><div class="chart-drill-table" id="drill-cat-min"></div></div>
      </div>`;

    makeSearchable('cat-graf-team');
    setupFilterToggles();
    // 1. Goles por jornada (GF y GC si hay equipo seleccionado)
    const goalsByRound = {}, goalsAgainstByRound = {};
    grafResults.forEach(m => {
      const w = m.match_week; if (!w) return;
      if (catGrafTeam) {
        const isHome = m.home_team_name === catGrafTeam;
        const gf = isHome ? (+m.home_score||0) : (+m.away_score||0);
        const gc = isHome ? (+m.away_score||0) : (+m.home_score||0);
        goalsByRound[w] = (goalsByRound[w]||0) + gf;
        goalsAgainstByRound[w] = (goalsAgainstByRound[w]||0) + gc;
      } else {
        goalsByRound[w] = (goalsByRound[w]||0) + (+m.home_score||0) + (+m.away_score||0);
      }
    });
    const rounds = Object.keys(goalsByRound).map(Number).sort((a,b)=>a-b);
    const goalsRoundDatasets = catGrafTeam ? [
      { label:'Goles a favor', data: rounds.map(r=>goalsByRound[r]||0), backgroundColor:'#D2001C', borderRadius:4 },
      { label:'Goles en contra', data: rounds.map(r=>goalsAgainstByRound[r]||0), backgroundColor:'#374151', borderRadius:4 }
    ] : [
      { label:'Goles', data: rounds.map(r=>goalsByRound[r]), backgroundColor:'#D2001C', borderRadius:4 }
    ];
    catCharts['goals-0'] = new Chart(document.getElementById('cat-ch-goals-0'), {
      type: 'bar',
      data: { labels: rounds.map(r=>`J${r}`), datasets: goalsRoundDatasets },
      options: {
        onClick: (evt, elements) => {
          if (!elements.length) return;
          const jornada = rounds[elements[0].index];
          const el = document.getElementById('drill-cat-goals');
          if (el._last === String(jornada)) { el.innerHTML=''; el._last=null; return; }
          el._last = String(jornada);
          const ms = grafResults.filter(r=>r.match_week==jornada).sort((a,b)=>(a.match_date||'').localeCompare(b.match_date||''));
          el.innerHTML = drillHeader('Jornada '+jornada+' — '+ms.length+' partidos','drill-cat-goals') + matchDrillHtml(ms);
        },
        plugins:{ legend:{ display: !!catGrafTeam }, datalabels:{anchor:'end',align:'end',color:'#374151',font:{weight:'700',size:11},formatter:v=>v>0?v:''} },
        scales:{ y:{beginAtZero:true} }
      }
    });

    // 2. Distribución de resultados (perspectiva del equipo si está seleccionado)
    let wins=0, draws=0, losses=0;
    grafResults.forEach(m => {
      const hs=+m.home_score, as_=+m.away_score;
      if (isNaN(hs)||isNaN(as_)) return;
      if (catGrafTeam) {
        const isHome = m.home_team_name === catGrafTeam;
        const tf = isHome ? hs : as_, tc = isHome ? as_ : hs;
        if (tf > tc) wins++; else if (tf === tc) draws++; else losses++;
      } else {
        if (hs>as_) wins++; else if (hs===as_) draws++; else losses++;
      }
    });
    catCharts['results-0'] = new Chart(document.getElementById('cat-ch-results-0'), {
      type: 'doughnut',
      data: {
        labels: catGrafTeam ? ['Victorias','Empates','Derrotas'] : ['Victoria local','Empate','Victoria visitante'],
        datasets:[{ data:[wins,draws,losses], backgroundColor:['#D2001C','#6B7280','#374151'], borderWidth:0 }]
      },
      options: { plugins:{ legend:{position:'bottom'}, datalabels:{display:false} } }
    });

    // 3. Top goleadores (filtrados por equipo si está seleccionado)
    const catScorerTeam = {};
    DB.scorers.forEach(s => { if (s.player_name) catScorerTeam[s.player_name] = s.team_name; });
    const scorerMap = {};
    goals.forEach(g => {
      if (!g.scorer_player_id || g.is_own_goal==='1') return;
      if (catGrafTeam) {
        const playerName = DB.players[g.scorer_player_id]?.player_name;
        if (catScorerTeam[playerName] !== catGrafTeam) return;
      }
      scorerMap[g.scorer_player_id] = (scorerMap[g.scorer_player_id]||0) + 1;
    });
    const top = Object.entries(scorerMap).sort((a,b)=>b[1]-a[1]).slice(0, catGrafTeam ? 20 : 15)
      .map(([id,n]) => { const name = DB.players[id]?.player_name || id; return { id, name, goals: n, team: catScorerTeam[name]||'' }; });
    catCharts['scorers-0'] = new Chart(document.getElementById('cat-ch-scorers-0'), {
      type: 'bar',
      data: { labels: top.map(s=>s.name.split(',')[0]), datasets:[{ label:'Goles', data:top.map(s=>s.goals), backgroundColor:top.map(s=>isRomo(s.team)?'#F59E0B':'#D2001C'), borderRadius:4 }] },
      options: {
        indexAxis:'y', clip:false, layout:{padding:{right:30}},
        onClick: (evt, elements) => {
          if (!elements.length) return;
          const scorer = top[elements[0].index];
          const el = document.getElementById('drill-cat-scorers');
          if (el._last === scorer.id) { el.innerHTML=''; el._last=null; return; }
          el._last = scorer.id;
          const gs = goals.filter(g=>g.scorer_player_id==scorer.id&&g.is_own_goal!=='1').sort((a,b)=>+a.minute-+b.minute);
          el.innerHTML = drillHeader(scorer.name.split(',')[0]+' — '+gs.length+' goles','drill-cat-scorers') + goalsDrillHtml(gs);
        },
        plugins:{legend:{display:false}, datalabels:{anchor:'end',align:'end',color:'#374151',font:{weight:'700',size:10},clip:false,formatter:v=>v>0?v:''}},
        scales:{x:{beginAtZero:true}}
      }
    });

    // 4. Goles por minuto (en partidos del equipo seleccionado)
    const matchIdsForTeam = catGrafTeam ? new Set(grafResults.map(m => m.match_id)) : null;
    const buckets = {'1-15':0,'16-30':0,'31-45':0,'46-60':0,'61-75':0,'76-90':0,'90+':0};
    const catMinRangeMap = {'1-15':[0,15],'16-30':[16,30],'31-45':[31,45],'46-60':[46,60],'61-75':[61,75],'76-90':[76,90],'90+':[91,999]};
    goals.forEach(g => {
      if (matchIdsForTeam && !matchIdsForTeam.has(g.match_id)) return;
      const min=+g.minute; if (isNaN(min)) return;
      if (min<=15) buckets['1-15']++;
      else if (min<=30) buckets['16-30']++;
      else if (min<=45) buckets['31-45']++;
      else if (min<=60) buckets['46-60']++;
      else if (min<=75) buckets['61-75']++;
      else if (min<=90) buckets['76-90']++;
      else buckets['90+']++;
    });
    const catBucketKeys = Object.keys(buckets);
    catCharts['min-0'] = new Chart(document.getElementById('cat-ch-min-0'), {
      type: 'bar',
      data: { labels:catBucketKeys, datasets:[{ label:'Goles', data:Object.values(buckets), backgroundColor:'#D2001C', borderRadius:4 }] },
      options: {
        onClick: (evt, elements) => {
          if (!elements.length) return;
          const rangeKey = catBucketKeys[elements[0].index];
          const el = document.getElementById('drill-cat-min');
          if (el._last === rangeKey) { el.innerHTML=''; el._last=null; return; }
          el._last = rangeKey;
          const [lo,hi] = catMinRangeMap[rangeKey];
          const gs = goals.filter(g=>{const m=+g.minute;return m>=lo&&m<=hi;}).sort((a,b)=>+a.minute-+b.minute);
          el.innerHTML = drillHeader('Minuto '+rangeKey+' — '+gs.length+' goles','drill-cat-min') + goalsDrillHtml(gs);
        },
        plugins:{legend:{display:false}, datalabels:{anchor:'end',align:'end',color:'#374151',font:{weight:'700',size:11},formatter:v=>v>0?v:''}},
        scales:{y:{beginAtZero:true}}
      }
    });
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

// ── Searchable selects ──
const ssInstances = {};

function makeSearchable(id) {
  const sel = document.getElementById(id);
  if (!sel) return;

  const wrapper = document.createElement('div');
  wrapper.className = 'ss-wrapper';
  sel.parentNode.insertBefore(wrapper, sel);
  wrapper.appendChild(sel);
  sel.style.display = 'none';

  const inputWrap = document.createElement('div');
  inputWrap.className = 'ss-input-wrap';

  const icon = document.createElement('span');
  icon.className = 'ss-icon';
  icon.innerHTML = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`;

  const input = document.createElement('input');
  input.type = 'text';
  input.className = 'ss-input';
  input.autocomplete = 'off';

  const dropdown = document.createElement('div');
  dropdown.className = 'ss-dropdown';

  inputWrap.appendChild(icon);
  inputWrap.appendChild(input);
  wrapper.appendChild(inputWrap);
  wrapper.appendChild(dropdown);

  function sync() {
    const opt = sel.options[sel.selectedIndex];
    input.value = (opt && opt.value) ? opt.text : '';
    input.placeholder = sel.options[0]?.text || 'Buscar...';
  }

  function buildDropdown(query) {
    const q = (query || '').toLowerCase();
    dropdown.innerHTML = '';
    Array.from(sel.options).forEach(opt => {
      if (q && opt.value && !opt.text.toLowerCase().includes(q)) return;
      const div = document.createElement('div');
      div.className = 'ss-option' + (opt.value === sel.value ? ' selected' : '');
      div.textContent = opt.text;
      div.addEventListener('mousedown', e => {
        e.preventDefault();
        sel.value = opt.value;
        sel.dispatchEvent(new Event('change'));
        sync();
        dropdown.classList.remove('open');
      });
      dropdown.appendChild(div);
    });
    if (!dropdown.children.length) {
      const empty = document.createElement('div');
      empty.className = 'ss-option';
      empty.style.color = 'var(--gray-500)';
      empty.textContent = 'Sin resultados';
      dropdown.appendChild(empty);
    }
  }

  input.addEventListener('focus', () => { buildDropdown(''); dropdown.classList.add('open'); });
  input.addEventListener('input', () => { buildDropdown(input.value); dropdown.classList.add('open'); });
  input.addEventListener('blur', () => setTimeout(() => { dropdown.classList.remove('open'); sync(); }, 150));

  sync();
  ssInstances[id] = { sync };
}

function syncAllSearchable() {
  Object.values(ssInstances).forEach(s => s.sync());
}

// ── Jugadores ──
function renderJugadores() {
  const comp = document.getElementById('j-competition').value;
  const team = document.getElementById('j-team').value;
  const top  = +document.getElementById('j-top').value || 10;

  const jEtapa = document.getElementById('j-etapa').value;
  const jProvincia = document.getElementById('j-provincia').value;

  let data = DB.playerStats || [];
  if (comp) data = data.filter(r => r.competition_key === comp);
  else {
    if (jEtapa) data = data.filter(r => DB.competitions[r.competition_key]?.etapa === jEtapa);
    if (jProvincia) data = data.filter(r => DB.competitions[r.competition_key]?.provincia === jProvincia);
  }
  if (team) data = data.filter(r => r.team_id == team);

  const byPlayer = {};
  data.forEach(r => {
    const id = r.player_id;
    if (!byPlayer[id]) byPlayer[id] = {
      player_name: r.player_name || r.player_nickname || id,
      team_name: r.team_name, crest_url: r.crest_url,
      minutes: 0, goals: 0, starters: 0
    };
    const p = byPlayer[id];
    p.minutes  += +r.minutes_played || 0;
    p.goals    += +r.goals          || 0;
    p.starters += +r.games_starter  || 0;
    if (r.team_name) { p.team_name = r.team_name; p.crest_url = r.crest_url; }
  });

  const all = Object.values(byPlayer);
  const rankMinutes  = [...all].sort((a,b) => b.minutes  - a.minutes ).slice(0, top);
  const rankGoals    = [...all].sort((a,b) => b.goals    - a.goals   ).filter(p => p.goals > 0).slice(0, top);
  const rankStarters = [...all].sort((a,b) => b.starters - a.starters).slice(0, top);

  function rankTable(list, valKey, valLabel) {
    if (!list.length) return '<div class="empty-state">Sin datos</div>';
    return `<table>
      <thead><tr>
        <th class="num">#</th><th>Jugador</th><th>Equipo</th>
        <th class="num">${valLabel}</th>
      </tr></thead>
      <tbody>
        ${list.map((p, i) => `<tr>
          <td class="num"><span class="rank-num ${i<3?'rank-'+(i+1):''}">${i+1}</span></td>
          <td class="bold">${p.player_name}</td>
          <td><div class="team-with-crest">
            <img src="${p.crest_url||''}" onerror="this.style.display='none'" style="width:20px;height:20px;object-fit:contain">
            <span>${p.team_name||''}</span>
          </div></td>
          <td class="num bold">${p[valKey].toLocaleString('es-ES')}</td>
        </tr>`).join('')}
      </tbody>
    </table>`;
  }

  document.getElementById('jugadores-content').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(360px,1fr));gap:20px">
      <div class="section-card">
        <div class="section-card-header">⏱️ Ranking de minutos jugados</div>
        ${rankTable(rankMinutes, 'minutes', 'Minutos')}
      </div>
      <div class="section-card">
        <div class="section-card-header">⚽ Ranking de goles</div>
        ${rankTable(rankGoals, 'goals', 'Goles')}
      </div>
      <div class="section-card">
        <div class="section-card-header">📋 Ranking de titularidades</div>
        ${rankTable(rankStarters, 'starters', 'Titularidades')}
      </div>
    </div>`;
}

init();

// ── PWA: Service Worker ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

// ── Mobile: collapsible filter bars ──
function setupFilterToggles() {
  if (window.innerWidth > 768) return;
  document.querySelectorAll('.filter-bar').forEach(bar => {
    if (bar.querySelector('.filter-toggle-btn')) return;

    // Wrap existing children in .filter-bar-inner
    const inner = document.createElement('div');
    inner.className = 'filter-bar-inner';
    while (bar.firstChild) inner.appendChild(bar.firstChild);
    bar.appendChild(inner);

    const btn = document.createElement('button');
    btn.className = 'filter-toggle-btn';
    btn.innerHTML = '<span>⚙️ Filtros</span><span class="filter-toggle-arrow">▼</span>';
    btn.addEventListener('click', () => {
      bar.classList.toggle('open');
      btn.querySelector('.filter-toggle-arrow').textContent = bar.classList.contains('open') ? '▲' : '▼';
    });
    bar.insertBefore(btn, inner);
  });
}
