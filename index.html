<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Actas 25-26 | Athletic Club</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="data:,">
  <meta name="theme-color" content="#111111">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Actas Romo">
  <link rel="apple-touch-icon" href="Escudo-Romoc.png">
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #111111;
      --red-dark: #000000;
      --red-light: #E5E7EB;
      --white: #FFFFFF;
      --gray-50: #F9FAFB;
      --gray-100: #F3F4F6;
      --gray-200: #E5E7EB;
      --gray-300: #D1D5DB;
      --gray-500: #6B7280;
      --gray-700: #374151;
      --gray-900: #111827;
      --shadow: 0 1px 3px rgba(0,0,0,.10), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,.10), 0 2px 4px -1px rgba(0,0,0,.06);
      --radius: 8px;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--gray-50);
      color: var(--gray-900);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--red);
      color: white;
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 56px;
      box-shadow: var(--shadow-md);
    }
    header img { height: 36px; }
    header h1 { font-size: 18px; font-weight: 700; letter-spacing: .3px; }
    header .subtitle { font-size: 13px; opacity: .85; margin-left: auto; }

    /* ── ROMO highlight ── */
    tr.romo-row { background: #FFF8E1 !important; }
    tr.romo-row td { font-weight: 700; color: #111827; }
    tr.romo-row td span { color: inherit; }
    .match-card.romo-match { border-left: 4px solid #F59E0B; background: #FFFBEB; }
    .match-card.romo-match span { font-weight: 700; }

    /* ── Nav ── */
    nav {
      background: white;
      border-bottom: 1px solid var(--gray-200);
      display: flex;
      padding: 0 24px;
      gap: 0;
      box-shadow: var(--shadow);
    }
    nav button {
      background: none;
      border: none;
      padding: 14px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--gray-500);
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all .15s;
    }
    nav button:hover { color: var(--red); }
    nav button.active { color: var(--red); border-bottom-color: var(--red); font-weight: 600; }

    /* ── Loading ── */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 300px;
      gap: 16px;
      color: var(--gray-500);
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--gray-200);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Pages ── */
    .page { display: none; padding: 24px; max-width: 1400px; margin: 0 auto; }
    .page.active { display: block; }

    /* ── Filter Bar ── */
    .filter-bar {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: flex-end;
      box-shadow: var(--shadow);
    }
    .filter-group { display: flex; flex-direction: column; gap: 4px; min-width: 160px; }
    .filter-group label { font-size: 11px; font-weight: 600; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; }
    .filter-group select, .filter-group input {
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      padding: 7px 10px;
      font-size: 13px;
      color: var(--gray-900);
      background: white;
      outline: none;
      transition: border-color .15s;
    }
    .filter-group select:focus, .filter-group input:focus { border-color: var(--red); }
    .filter-group.wide { min-width: 320px; }
    .filter-group.x-wide { min-width: 400px; }

    /* ── Searchable Select ── */
    .ss-wrapper { position: relative; width: 100%; }
    .ss-input-wrap { position: relative; display: flex; align-items: center; }
    .ss-icon {
      position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
      color: var(--gray-500); pointer-events: none; display: flex; align-items: center;
    }
    .ss-input {
      width: 100%;
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      padding: 7px 10px 7px 36px;
      font-size: 13px;
      color: var(--gray-900);
      background: white;
      outline: none;
      transition: border-color .15s;
      cursor: text;
    }
    .ss-input:focus { border-color: var(--red); }
    .ss-dropdown {
      display: none;
      position: absolute;
      top: calc(100% + 2px);
      left: 0; right: 0;
      background: white;
      border: 1px solid var(--gray-300);
      border-radius: 6px;
      box-shadow: var(--shadow-md);
      z-index: 200;
      max-height: 220px;
      overflow-y: auto;
    }
    .ss-dropdown.open { display: block; }
    .ss-option {
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      color: var(--gray-900);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .ss-option:hover { background: var(--gray-100); }
    .ss-option.selected { font-weight: 600; color: var(--red); }

    .btn {
      background: var(--red);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 8px 18px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      align-self: flex-end;
    }
    .btn:hover { background: var(--red-dark); }
    .btn.secondary {
      background: white;
      color: var(--gray-700);
      border: 1px solid var(--gray-300);
    }
    .btn.secondary:hover { background: var(--gray-50); }

    /* ── Matches Grid ── */
    .matches-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .matches-header span { font-size: 13px; color: var(--gray-500); }

    .match-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: box-shadow .15s, border-color .15s;
      display: grid;
      grid-template-columns: 140px 1fr auto 1fr 120px;
      align-items: center;
      gap: 8px;
      box-shadow: var(--shadow);
    }
    .match-card:hover { box-shadow: var(--shadow-md); border-color: var(--red); }

    .match-meta { font-size: 11px; color: var(--gray-500); }
    .match-meta strong { display: block; font-size: 12px; color: var(--gray-700); }

    .team-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .team-cell.away { flex-direction: row-reverse; }
    .team-cell img { width: 28px; height: 28px; object-fit: contain; }
    .team-cell span { font-size: 13px; font-weight: 500; }
    .team-cell.away span { text-align: right; }

    .score-box {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: var(--gray-900);
      color: white;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 18px;
      font-weight: 700;
      min-width: 80px;
    }
    .score-box .sep { opacity: .4; font-size: 14px; }

    .match-comp {
      font-size: 11px;
      color: var(--gray-500);
      text-align: right;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 120px;
    }
    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .badge.W { background: #D1FAE5; color: #065F46; }
    .badge.D { background: #FEF3C7; color: #92400E; }
    .badge.L { background: #FEE2E2; color: #991B1B; }

    /* ── Jornada group ── */
    .jornada-group { margin-bottom: 16px; }
    .jornada-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 14px;
      background: var(--gray-900);
      color: white;
      border-radius: var(--radius) var(--radius) 0 0;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .3px;
    }
    .jornada-count {
      font-size: 11px;
      font-weight: 400;
      opacity: .7;
      margin-left: auto;
    }
    .jornada-group .match-card {
      border-radius: 0;
      border-top: none;
      margin-bottom: 0;
    }
    .jornada-group .match-card:last-child {
      border-radius: 0 0 var(--radius) var(--radius);
    }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-top: 20px;
    }
    .pagination button {
      border: 1px solid var(--gray-300);
      background: white;
      border-radius: 6px;
      padding: 6px 12px;
      font-size: 13px;
      cursor: pointer;
    }
    .pagination button.active { background: var(--red); color: white; border-color: var(--red); }
    .pagination button:disabled { opacity: .4; cursor: default; }

    /* ── Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 1000;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px;
      overflow-y: auto;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: white;
      border-radius: 12px;
      width: 100%;
      max-width: 820px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      overflow: hidden;
    }
    .modal-header {
      background: var(--gray-900);
      color: white;
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header .comp-name { font-size: 12px; opacity: .7; }
    .modal-header .match-date { font-size: 13px; }
    .modal-header button {
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      line-height: 1;
      opacity: .7;
    }
    .modal-header button:hover { opacity: 1; }

    .modal-score {
      background: var(--gray-900);
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 16px;
    }
    .modal-team {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
    }
    .modal-team.away { }
    .modal-team img { width: 52px; height: 52px; object-fit: contain; }
    .modal-team span { color: white; font-size: 14px; font-weight: 600; }
    .modal-score-box {
      color: white;
      font-size: 42px;
      font-weight: 800;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .modal-score-box .sep { opacity: .3; font-size: 28px; }

    .modal-body { padding: 20px; }

    .modal-info {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--gray-200);
    }
    .info-item { font-size: 13px; color: var(--gray-700); }
    .info-item span { color: var(--gray-500); font-size: 12px; }

    .modal-section { margin-bottom: 20px; }
    .modal-section h3 {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--gray-500);
      margin-bottom: 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--gray-200);
    }

    .event-list { display: flex; flex-direction: column; gap: 4px; }
    .event-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 13px;
    }
    .event-item:hover { background: var(--gray-50); }
    .event-item .min {
      background: var(--gray-200);
      color: var(--gray-700);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 11px;
      font-weight: 700;
      min-width: 36px;
      text-align: center;
    }
    .event-item .icon { font-size: 16px; }
    .event-item .team-tag { font-size: 11px; color: var(--gray-500); margin-left: auto; }

    .lineup-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .lineup-col h4 { font-size: 12px; font-weight: 600; color: var(--gray-700); margin-bottom: 8px; }
    .lineup-player {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 6px;
      font-size: 12px;
      border-radius: 4px;
    }
    .lineup-player:hover { background: var(--gray-50); }
    .lineup-player .num {
      background: var(--gray-200);
      color: var(--gray-700);
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .lineup-player.sub .num { background: var(--gray-100); }
    .lineup-player.sub { color: var(--gray-500); }
    .lineup-player .player-name { min-width: 0; }
    .lineup-player .player-icons { display: flex; align-items: center; gap: 3px; flex-shrink: 0; font-size: 11px; }
    .lineup-player .sub-out { color: #EF4444; font-weight: 700; font-size: 10px; }
    .lineup-player .sub-in  { color: #22C55E; font-weight: 700; font-size: 10px; }
    .lineup-player .sub-min { color: #6B7280; font-size: 10px; }

    /* ── Resúmenes page ── */
    .section-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      margin-bottom: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .section-card-header {
      padding: 14px 20px;
      background: var(--gray-50);
      border-bottom: 1px solid var(--gray-200);
      font-size: 14px;
      font-weight: 600;
      color: var(--gray-900);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left;
      padding: 10px 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: var(--gray-500);
      border-bottom: 1px solid var(--gray-200);
      white-space: nowrap;
    }
    thead th.num { text-align: center; }
    tbody td { padding: 8px 12px; border-bottom: 1px solid var(--gray-100); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--gray-50); }
    td.num { text-align: center; }
    td.bold { font-weight: 700; }

    .team-with-crest {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .team-with-crest img { width: 20px; height: 20px; object-fit: contain; }

    .form-badges { display: flex; gap: 3px; }
    .form-badge {
      width: 18px; height: 18px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .form-badge.W { background: #D1FAE5; color: #065F46; }
    .form-badge.D { background: #FEF3C7; color: #92400E; }
    .form-badge.L { background: #FEE2E2; color: #991B1B; }

    .rank-num { font-weight: 700; color: var(--gray-500); }
    .rank-1 { color: #D97706; }
    .rank-2 { color: var(--gray-500); }
    .rank-3 { color: #B45309; }

    /* ── Chart drill table ── */
    .chart-drill-table {
      margin-top: 12px;
      border-top: 2px solid var(--gray-200);
      padding-top: 12px;
      overflow-x: auto;
    }
    .chart-drill-table table { font-size: 12px; min-width: 0; }
    .drill-hdr {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      font-weight: 700;
      color: var(--gray-700);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 8px;
      padding: 6px 10px;
      background: var(--gray-100);
      border-radius: 6px;
      cursor: pointer;
    }
    .drill-hdr:hover { background: var(--gray-200); }

    /* ── Gráficas page ── */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(440px, 1fr));
      gap: 20px;
    }
    .chart-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 20px;
      box-shadow: var(--shadow);
    }
    .chart-card h3 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 4px;
      color: var(--gray-900);
    }
    .chart-card p { font-size: 12px; color: var(--gray-500); margin-bottom: 16px; }
    .chart-card canvas { max-height: 320px; }

    /* ── Stats summary row ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }
    .stat-card {
      background: white;
      border: 1px solid var(--gray-200);
      border-radius: var(--radius);
      padding: 14px 16px;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .stat-card .val { font-size: 28px; font-weight: 800; color: var(--red); }
    .stat-card .lbl { font-size: 11px; color: var(--gray-500); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      /* Header */
      header { padding: 0 12px; height: 50px; gap: 10px; }
      header img { height: 28px; }
      header h1 { font-size: 15px; }
      header .subtitle { font-size: 11px; }

      /* Top nav — scrollable */
      nav { padding: 0 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
      nav::-webkit-scrollbar { display: none; }
      nav button { padding: 12px 14px; font-size: 12px; white-space: nowrap; }

      /* Sub-tabs bar — scrollable */
      #cat-subtabs-bar { overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; padding: 0 8px !important; }
      #cat-subtabs-bar::-webkit-scrollbar { display: none; }

      /* Pages — reduce padding + safe area */
      .page { padding: 12px 12px calc(12px + env(safe-area-inset-bottom)); }
      #categorias-content { padding: 12px !important; }

      /* Filter bar — collapsible on mobile */
      .filter-bar { padding: 0; flex-direction: column; gap: 0; }
      .filter-toggle-btn {
        display: flex !important;
        width: 100%;
        justify-content: space-between;
        align-items: center;
        padding: 12px 14px;
        font-size: 13px;
        font-weight: 600;
        background: white;
        border: none;
        border-radius: var(--radius);
        cursor: pointer;
        color: var(--gray-700);
      }
      .filter-bar-inner {
        display: none;
        flex-wrap: wrap;
        gap: 10px;
        padding: 12px;
        border-top: 1px solid var(--gray-200);
      }
      .filter-bar.open .filter-bar-inner { display: flex; }
      .filter-bar .filter-group { min-width: calc(50% - 5px); flex: 1 1 calc(50% - 5px); }
      .filter-bar .filter-group.wide { min-width: 100%; flex: 1 1 100%; }
      .filter-bar .btn { align-self: stretch; }

      /* Match cards — mobile layout */
      .match-card {
        grid-template-columns: 1fr auto 1fr;
        grid-template-rows: auto auto;
        gap: 4px 6px;
        padding: 10px 12px;
      }
      .match-meta {
        grid-column: 1 / 4;
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 2px;
      }
      .match-meta strong { display: inline; font-size: 12px; }
      .match-comp {
        grid-column: 1 / 4;
        text-align: left;
        margin-top: 2px;
        max-width: 100%;
      }
      .team-cell span { font-size: 12px; }
      .team-cell img { width: 22px; height: 22px; }
      .score-box { padding: 4px 10px; font-size: 15px; min-width: 60px; }

      /* Charts */
      .charts-grid { grid-template-columns: 1fr; }
      .chart-card canvas { max-height: 240px; }

      /* Lineup */
      .lineup-grid { grid-template-columns: 1fr; }

      /* Modal — full screen */
      .modal-overlay { padding: 0; align-items: flex-end; }
      .modal {
        border-radius: 16px 16px 0 0;
        max-height: 92dvh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .modal-score-box { font-size: 32px; }
      .modal-team img { width: 40px; height: 40px; }

      /* Stats row */

<script>
// ── Data store ──
const DB = {};
let charts = {};
let catCharts = {};
Chart.register(ChartDataLabels);

// ── Drill helpers ──
function drillHeader(title, drillId) {
  return `<div class="drill-hdr" onclick="var e=document.getElementById('${drillId}');e.innerHTML='';e._last=null;">▼ ${title} <span style="font-size:10px;font-weight:400;color:var(--gray-500)">(click para cerrar)</span></div>`;
}
function matchDrillHtml(matches) {
  if (!matches.length) return '<div class="empty-state" style="padding:16px">Sin partidos</div>';
  return '<table><thead><tr><th>Fecha</th><th class="num">J</th><th>Local</th><th class="num">Res</th><th>Visitante</th><th>Competición</th></tr></thead><tbody>' +
    matches.map(m => {
      const cls = (isRomo(m.home_team_name)||isRomo(m.away_team_name)) ? 'romo-row' : '';
      const date = m.match_date ? new Date(m.match_date).toLocaleDateString('es-ES',{day:'2-digit',month:'short',year:'numeric'}) : '-';
      const compName = DB.competitions[m.competition_key]?.competition_name || '';
      return `<tr class="${cls}" style="cursor:pointer" onclick="openModal('${m.match_id}')">` +
        `<td>${date}</td>` +
        `<td class="num">J${m.match_week||'-'}</td>` +
        `<td><div class="team-with-crest"><img src="${m.home_crest_url||''}" onerror="this.style.display='none'" style="width:16px;height:16px;object-fit:contain"><span>${m.home_team_name}</span></div></td>` +
        `<td class="num bold" style="white-space:nowrap">${m.home_score??'-'} : ${m.away_score??'-'}</td>` +
        `<td><div class="team-with-crest"><img src="${m.away_crest_url||''}" onerror="this.style.display='none'" style="width:16px;height:16px;object-fit:contain"><span>${m.away_team_name}</span></div></td>` +
        `<td style="font-size:11px;color:var(--gray-500)">${compName}</td>` +
        `</tr>`;
    }).join('') + '</tbody></table>';
}
function goalsDrillHtml(gs) {
  if (!gs.length) return '<div class="empty-state" style="padding:16px">Sin goles</div>';
  return '<table><thead><tr><th>Jugador</th><th>Equipo</th><th class="num">Min</th><th>Tipo</th><th>Partido</th></tr></thead><tbody>' +
    gs.map(g => {
      const match = DB.results.find(r => r.match_id == g.match_id);
      const player = DB.players[g.scorer_player_id];
      const playerName = player?.player_name || g.scorer_player_id || '-';
      const type = g.is_own_goal==='1'?'p.p.':g.is_penalty==='1'?'pen.':'-';
      const teamName = match ? (g.scoring_team_id == match.home_team_id ? match.home_team_name : match.away_team_name) : '';
      const matchStr = match ? `${match.home_team_name} ${match.home_score}:${match.away_score} ${match.away_team_name}` : '-';
      return `<tr style="cursor:pointer" onclick="openModal('${g.match_id}')">` +
        `<td>${playerName}</td><td style="font-size:11px">${teamName}</td>` +
        `<td class="num">${g.minute}'</td><td style="font-size:11px">${type}</td>` +
        `<td style="font-size:11px;color:var(--gray-500)">${matchStr}</td>` +
        `</tr>`;
    }).join('') + '</tbody></table>';
}

// ── CSV loader ──
function loadCSV(name) {
  return new Promise((resolve, reject) => {
    Papa.parse(name, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: r => resolve(r.data),
      error: e => reject(e)
    });
  });
}

// ── Init ──
async function init() {
  try {
    const [
      results, standings, scorers, goals, cards, lineups,
      teams, players, stadiums, referees, competitions, compSeasons, factMatch,
      playerStats
    ] = await Promise.all([
      loadCSV('agg_results.csv'),
      loadCSV('agg_standings.csv'),
      loadCSV('agg_goal_scorers.csv'),
      loadCSV('fact_goal.csv'),
      loadCSV('fact_card.csv'),
      loadCSV('fact_lineup.csv'),
      loadCSV('dim_team.csv'),
      loadCSV('dim_player.csv'),
      loadCSV('dim_stadium.csv'),
      loadCSV('dim_referee.csv'),
      loadCSV('dim_competition.csv'),
      loadCSV('competition_season.csv'),
      loadCSV('fact_match.csv'),
      loadCSV('agg_team_player_stats.csv')
    ]);

    // Build lookup maps
    DB.teams = Object.fromEntries(teams.map(t => [t.team_id, t]));
    DB.players = Object.fromEntries(players.map(p => [p.player_id, p]));
    DB.stadiums = Object.fromEntries(stadiums.map(s => [s.stadium_id, s]));
    DB.referees = Object.fromEntries(referees.map(r => [r.referee_id, r]));

    // Competitions map by key
    DB.competitions = Object.fromEntries(competitions.map(c => [c.competition_key, c]));
    DB.compSeasons = Object.fromEntries(compSeasons.map(c => [`${c.competition_id}-${c.season_id}-${c.group_id}`, c]));

    // Index goals/cards/lineups by match_id
    DB.goalsByMatch = {};
    goals.forEach(g => {
      if (!DB.goalsByMatch[g.match_id]) DB.goalsByMatch[g.match_id] = [];
      DB.goalsByMatch[g.match_id].push(g);
    });

    DB.cardsByMatch = {};
    cards.forEach(c => {
      if (!DB.cardsByMatch[c.match_id]) DB.cardsByMatch[c.match_id] = [];
      DB.cardsByMatch[c.match_id].push(c);
    });

    DB.lineupsByMatch = {};
    lineups.forEach(l => {
      if (!DB.lineupsByMatch[l.match_id]) DB.lineupsByMatch[l.match_id] = [];
      DB.lineupsByMatch[l.match_id].push(l);
    });

    // Fact match map
    DB.factMatch = Object.fromEntries(factMatch.map(m => [m.match_id, m]));

    // Player stats
    DB.playerStats = playerStats;

    // Store main data
    DB.results = results;
    DB.standings = standings;
    DB.scorers = scorers;
    DB.goals = goals;
    DB.cards = cards;

    // Distinct competition list (sorted)
    DB.competitionList = [...new Set(results.map(r => r.competition_key))]
      .map(key => ({ key, name: DB.competitions[key]?.competition_name || key }))
      .sort((a, b) => a.name.localeCompare(b.name));

    // Distinct teams (sorted)
    DB.teamList = Object.values(DB.teams)
      .filter(t => t.team_name)
      .sort((a, b) => a.team_name.localeCompare(b.team_name));

    document.getElementById('loading').style.display = 'none';
    setupFilters();
    setupFilterToggles();
    showPage('categorias');
    renderCategorias();

  } catch(e) {
    document.getElementById('loading').innerHTML =
      `<div style="color:#D2001C;text-align:center"><b>Error cargando datos</b><br><small>${e.message}</small><br><small>Asegúrate de servir la app con un servidor HTTP local</small></div>`;
    console.error(e);
  }
}

// ── Filter setup ──
function setupFilters() {
  // Populate etapa and provincia options
  const etapas = [...new Set(Object.values(DB.competitions).map(c => c.etapa).filter(Boolean))].sort();
  const provincias = [...new Set(Object.values(DB.competitions).map(c => c.provincia).filter(Boolean))].sort();

  ['f-etapa','r-etapa','g-etapa','j-etapa'].forEach(id => {
    const sel = document.getElementById(id);
    etapas.forEach(e => { const o = document.createElement('option'); o.value = e; o.textContent = e; sel.appendChild(o); });
  });
  ['f-provincia','r-provincia','g-provincia','j-provincia'].forEach(id => {
    const sel = document.getElementById(id);
    provincias.forEach(p => { const o = document.createElement('option'); o.value = p; o.textContent = p; sel.appendChild(o); });
  });

  const compSel = ['f-competition','r-competition','g-competition'];
  compSel.forEach(id => {
    const sel = document.getElementById(id);
    DB.competitionList.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.key;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  });

  const teamSel = ['f-team','g-team'];
  teamSel.forEach(id => {
    const sel = document.getElementById(id);
    DB.teamList.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.team_id;
      opt.textContent = t.team_name;
      sel.appendChild(opt);
    });
  });

  const weeks = [...new Set(DB.results.map(r => +r.match_week))].filter(Boolean).sort((a,b) => a-b);
  const wkSel = document.getElementById('f-week');
  weeks.forEach(w => {
    const opt = document.createElement('option');
    opt.value = w;
    opt.textContent = `Jornada ${w}`;
    wkSel.appendChild(opt);
  });

  const rComp = document.getElementById('r-competition');
  rComp.addEventListener('change', renderResumenes);
  rComp.value = '22619989-21-22619990';

  // Set ROMO F.C. as default in f-team and g-team (already populated above)
  ['f-team','g-team'].forEach(id => {
    const sel = document.getElementById(id);
    const romoOpt = [...sel.options].find(o => o.textContent.toLowerCase().includes('romo'));
    if (romoOpt) sel.value = romoOpt.value;
  });

  // Initial render — show only Romo by default
  currentPage = 1;
  document.getElementById('btn-mostrar-todas').style.display = '';
  applyFilters();
  renderGraficas();

  // Jugadores filters
  const jCompSel = document.getElementById('j-competition');
  DB.competitionList.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.key; opt.textContent = c.name;
    jCompSel.appendChild(opt);
  });

  // Etapa/provincia change listeners — filter competition dropdowns
  ['r-etapa','r-provincia'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => { filterCompSelect('r-competition'); renderResumenes(); });
  });
  ['g-etapa','g-provincia'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => { filterCompSelect('g-competition'); renderGraficas(); });
  });
  ['j-etapa','j-provincia'].forEach(id => {
    document.getElementById(id).addEventListener('change', () => { filterCompSelect('j-competition'); renderJugadores(); });
  });
  document.getElementById('j-competition').addEventListener('change', renderJugadores);
  const jTeamSel = document.getElementById('j-team');
  jTeamSel.addEventListener('change', renderJugadores);
  DB.teamList.forEach(t => {
    const opt = document.createElement('option');
    opt.value = t.team_id; opt.textContent = t.team_name;
    jTeamSel.appendChild(opt);
  });

  // Activate searchable dropdowns after options are populated
  ['f-etapa','f-provincia','f-competition','f-team','f-week','r-etapa','r-provincia','r-competition','g-etapa','g-provincia','g-competition','g-team','j-etapa','j-provincia','j-competition','j-team'].forEach(makeSearchable);

  // Set ROMO F.C. as default in j-team (populated just above)
  const jTeamRomo = [...jTeamSel.options].find(o => o.textContent.toLowerCase().includes('romo'));
  if (jTeamRomo) jTeamSel.value = jTeamRomo.value;
  syncAllSearchable();

  // Auto-filter on change (no need to click Filtrar)
  ['f-etapa','f-provincia','f-competition','f-team','f-week'].forEach(id => {
    document.getElementById(id).addEventListener('change', applyFilters);
  });
  ['f-date-from','f-date-to'].forEach(id => {
    document.getElementById(id).addEventListener('change', applyFilters);
  });

  document.getElementById('r-team-filter').value = 'ROMO';
  renderResumenes();
}

// ── Page navigation ──
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(`page-${name}`).classList.add('active');
  if (name === 'resumenes' && !document.getElementById('r-competition').value) {
    renderResumenes();
  }
  if (name === 'jugadores') {
    renderJugadores();
  }
}

function showCategoria(idx) {
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  showPage('categorias');
  catSelectedIdx = idx;
  catActasPage = 1;
  renderCategorias();
}

// ── Actas ──
let filteredMatches = [];
let currentPage = 1;
const PAGE_SIZE = 30;

function filterCompSelect(selectId) {
  const prefixMap = { 'r-competition': 'r', 'g-competition': 'g', 'j-competition': 'j' };
  const prefix = prefixMap[selectId] || 'f';
  const etapa = document.getElementById(`${prefix}-etapa`)?.value || '';
  const provincia = document.getElementById(`${prefix}-provincia`)?.value || '';
  const sel = document.getElementById(selectId);
  const currentVal = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  DB.competitionList.forEach(c => {
    const comp = DB.competitions[c.key];
    if (etapa && comp?.etapa !== etapa) return;
    if (provincia && comp?.provincia !== provincia) return;
    const opt = document.createElement('option');
    opt.value = c.key; opt.textContent = c.name;
    sel.appendChild(opt);
  });
  sel.value = currentVal;
  if (ssInstances[selectId]) ssInstances[selectId].sync();
}

function applyFilters() {
  const etapa = document.getElementById('f-etapa').value;
  const provincia = document.getElementById('f-provincia').value;
  const comp = document.getElementById('f-competition').value;
  const team = document.getElementById('f-team').value;
  const week = document.getElementById('f-week').value;
  const from = document.getElementById('f-date-from').value;
  const to = document.getElementById('f-date-to').value;

  filteredMatches = DB.results.filter(m => {
    if (etapa && DB.competitions[m.competition_key]?.etapa !== etapa) return false;
    if (provincia && DB.competitions[m.competition_key]?.provincia !== provincia) return false;
    if (comp && m.competition_key !== comp) return false;
    if (team && m.home_team_id != team && m.away_team_id != team) return false;
    if (week && m.match_week != week) return false;
    if (from && m.match_date < from) return false;
    if (to && m.match_date > to) return false;
    return true;
  }).sort((a, b) => {
    const wDiff = (+a.match_week || 0) - (+b.match_week || 0);
    if (wDiff !== 0) return wDiff;
    return (a.match_date || '').localeCompare(b.match_date || '');
  });
  currentPage = 1;
  renderMatches();
}

function mostrarTodas() {
  document.getElementById('f-team').value = '';
  syncAllSearchable();
  document.getElementById('btn-mostrar-todas').style.display = 'none';
  applyFilters();
}

function clearFilters() {
  ['f-etapa','f-provincia','f-competition','f-week'].forEach(id => document.getElementById(id).value = '');
  ['f-date-from','f-date-to'].forEach(id => document.getElementById(id).value = '');
  const fTeamSel = document.getElementById('f-team');
  const romoOpt = [...fTeamSel.options].find(o => o.textContent.toLowerCase().includes('romo f.c'));
  fTeamSel.value = romoOpt ? romoOpt.value : '';
  syncAllSearchable();
  document.getElementById('btn-mostrar-todas').style.display = 'none';
  filteredMatches = DB.results;
  currentPage = 1;
  renderMatches();
  ['btn-mis-equipos', 'btn-mis-competiciones'].forEach(id => {
    const b = document.getElementById(id);
    b.style.opacity = '1';
    b._active = false;
    b.textContent = id === 'btn-mis-equipos' ? 'MIS EQUIPOS' : 'MIS COMPETICIONES';
  });
}

const MIS_EQUIPOS_KEYWORDS = ['romo', 'itzulbatzeta'];
function isRomo(name) { return !!(name && name.toLowerCase().includes('romo')); }
// "Mis equipos" = cualquier equipo del club (Romo cadete, Romo F.C. juvenil, Itzulbatzeta, etc.)
function isMiEquipo(name) { return !!(name && MIS_EQUIPOS_KEYWORDS.some(kw => name.toLowerCase().includes(kw))); }

function toggleMisEquipos() {
  const btn = document.getElementById('btn-mis-equipos');
  btn._active = !btn._active;
  btn.style.opacity = btn._active ? '0.6' : '1';
  btn.textContent = btn._active ? '★ MIS EQUIPOS' : 'MIS EQUIPOS';

  if (btn._active) {
    const myTeamIds = new Set(
      Object.values(DB.teams)
        .filter(t => MIS_EQUIPOS_KEYWORDS.some(kw => t.team_name.toLowerCase().includes(kw)))
        .map(t => t.team_id)
    );
    const comp = document.getElementById('f-competition').value;
    filteredMatches = DB.results.filter(m => {
      if (comp && m.competition_key !== comp) return false;
      return myTeamIds.has(m.home_team_id) || myTeamIds.has(m.away_team_id);
    });
  } else {
    filteredMatches = DB.results;
  }
  currentPage = 1;
  renderMatches();
}

const MIS_COMPETICIONES_KEYWORDS = ['cadete honor bizkaia', 'liga vasca juvenil'];

function toggleMisCompeticiones() {
  const btn = document.getElementById('btn-mis-competiciones');
  btn._active = !btn._active;
  btn.style.opacity = btn._active ? '0.6' : '1';
  btn.textContent = btn._active ? '★ MIS COMPETICIONES' : 'MIS COMPETICIONES';

  if (btn._active) {
    const myCompKeys = new Set(
      Object.values(DB.competitions)
        .filter(c => MIS_COMPETICIONES_KEYWORDS.some(kw => c.competition_name.toLowerCase().includes(kw)))
        .map(c => c.competition_key)
    );
    filteredMatches = DB.results.filter(m => myCompKeys.has(m.competition_key));
  } else {
    filteredMatches = DB.results;
  }
  currentPage = 1;
  renderMatches();
}

function renderMatches() {
  const total = filteredMatches.length;
  document.getElementById('match-count').textContent = `${total.toLocaleString()} partidos`;

  filteredMatches.sort((a, b) => {
    const wa = parseFloat(a.match_week), wb = parseFloat(b.match_week);
    if (!isNaN(wa) && !isNaN(wb) && wa !== wb) return wb - wa;
    return (b.match_date || '').localeCompare(a.match_date || '');
  });

  const start = (currentPage - 1) * PAGE_SIZE;
  const page = filteredMatches.slice(start, start + PAGE_SIZE);

  // Group by match_week
  const byWeek = {};
  page.forEach(m => {
    const w = m.match_week != null && m.match_week !== '' ? m.match_week : '—';
    if (!byWeek[w]) byWeek[w] = [];
    byWeek[w].push(m);
  });
  const weeks = Object.keys(byWeek).sort((a, b) => {
    const na = parseFloat(a), nb = parseFloat(b);
    if (isNaN(na) || isNaN(nb)) return String(a).localeCompare(String(b));
    return na - nb;
  });

  const list = document.getElementById('matches-list');
  list.innerHTML = weeks.map(w => `
    <div class="jornada-group">
      <div class="jornada-header">
        Jornada ${w}
        <span class="jornada-count">${byWeek[w].length} partido${byWeek[w].length !== 1 ? 's' : ''}</span>
      </div>
      ${byWeek[w].map(m => matchCard(m)).join('')}
    </div>
  `).join('');

  renderPagination(total);
}

function matchCard(m) {
  const comp = DB.competitions[m.competition_key];
  const compName = comp?.competition_name || '';
  const date = m.match_date ? new Date(m.match_date).toLocaleDateString('es-ES', {day:'2-digit',month:'short',year:'numeric'}) : '';
  const time = m.kick_off ? m.kick_off.slice(0,5) : '';

  const homeCrest = m.home_crest_url || '';
  const awayCrest = m.away_crest_url || '';

  const resultBadge = m.home_result
    ? `<span class="badge ${m.home_result}">${m.home_result === 'W' ? 'V' : m.home_result === 'D' ? 'E' : 'D'}</span>`
    : '';

  return `<div class="match-card" onclick="openModal('${m.match_id}')">
    <div class="match-meta">
      <strong>${date}</strong>
      ${time} · J${m.match_week || '-'}
      ${resultBadge}
    </div>
    <div class="team-cell">
      <img src="${homeCrest}" alt="" onerror="this.style.display='none'">
      <span>${m.home_team_name || ''}</span>
    </div>
    <div class="score-box">
      <span>${m.home_score ?? '-'}</span>
      <span class="sep">:</span>
      <span>${m.away_score ?? '-'}</span>
    </div>
    <div class="team-cell away">
      <img src="${awayCrest}" alt="" onerror="this.style.display='none'">
      <span>${m.away_team_name || ''}</span>
    </div>
    <div class="match-comp" title="${compName}">${compName}</div>
  </div>`;
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const pag = document.getElementById('pagination');

  if (totalPages <= 1) { pag.innerHTML = ''; return; }

  let html = '';
  html += `<button onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;

  const range = [];
  for (let i = Math.max(1, currentPage-2); i <= Math.min(totalPages, currentPage+2); i++) range.push(i);
  if (range[0] > 1) { html += `<button onclick="goPage(1)">1</button>`; if (range[0] > 2) html += `<span style="padding:0 4px">…</span>`; }
  range.forEach(i => {
    html += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  });
  if (range[range.length-1] < totalPages) {
    if (range[range.length-1] < totalPages-1) html += `<span style="padding:0 4px">…</span>`;
    html += `<button onclick="goPage(${totalPages})">${totalPages}</button>`;
  }
  html += `<button onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;

  pag.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderMatches();
  document.getElementById('page-actas').scrollTo(0,0);
  window.scrollTo(0,0);
}

// ── Modal ──
function openModal(matchId) {
  const m = DB.results.find(r => r.match_id == matchId) || DB.factMatch[matchId];
  if (!m) return;

  const fm = DB.factMatch[matchId] || {};
  const comp = DB.competitions[m.competition_key];

  document.getElementById('m-comp').textContent = comp?.competition_name || m.competition_key || '';
  const date = m.match_date ? new Date(m.match_date).toLocaleDateString('es-ES', {weekday:'long',day:'2-digit',month:'long',year:'numeric'}) : '';
  const time = m.kick_off ? m.kick_off.slice(0,5) : '';
  document.getElementById('m-date').textContent = `${date} ${time ? '· ' + time : ''}`;

  // Score
  document.getElementById('m-score').innerHTML =
    `<span>${m.home_score ?? '-'}</span><span class="sep">:</span><span>${m.away_score ?? '-'}</span>`;

  // Teams
  const homeCrest = m.home_crest_url || '';
  const awayCrest = m.away_crest_url || '';
  document.getElementById('m-home-team').innerHTML =
    `<img src="${homeCrest}" onerror="this.style.display='none'"><span>${m.home_team_name || ''}</span>`;
  document.getElementById('m-away-team').innerHTML =
    `<img src="${awayCrest}" onerror="this.style.display='none'"><span>${m.away_team_name || ''}</span>`;

  // Info
  const stadium = DB.stadiums[fm.stadium_id];
  const referee = DB.referees[fm.referee_id];
  let infoHtml = '';
  if (stadium) infoHtml += `<div class="info-item"><span>Estadio</span><br>${stadium.stadium_name}${stadium.city ? ', '+stadium.city : ''}</div>`;
  if (referee) infoHtml += `<div class="info-item"><span>Árbitro</span><br>${referee.referee_name}</div>`;
  if (m.match_week) infoHtml += `<div class="info-item"><span>Jornada</span><br>${m.match_week}</div>`;
  document.getElementById('m-info').innerHTML = infoHtml;

  // Goals
  const matchGoals = (DB.goalsByMatch[matchId] || []).sort((a,b) => +a.minute - +b.minute);
  const goalsEl = document.getElementById('m-goals');
  if (matchGoals.length === 0) {
    goalsEl.innerHTML = '<div style="color:#6B7280;font-size:13px;padding:4px 8px">Sin goles registrados</div>';
  } else {
    goalsEl.innerHTML = matchGoals.map(g => {
      const player = DB.players[g.scorer_player_id];
      const playerName = player?.player_name || (g.scorer_player_id ? g.scorer_player_id : 'Desconocido');
      const team = g.scoring_team_id == m.home_team_id ? m.home_team_name : m.away_team_name;
      const icon = g.is_own_goal == '1' ? '⚽🔴' : g.is_penalty == '1' ? '⚽(P)' : '⚽';
      const type = g.is_own_goal == '1' ? ' (p.p.)' : g.is_penalty == '1' ? ' (pen.)' : '';
      return `<div class="event-item"><span class="min">${g.minute}'</span><span class="icon">${icon}</span><span>${playerName}${type}</span><span class="team-tag">${team||''}</span></div>`;
    }).join('');
  }

  // Cards
  const matchCards = (DB.cardsByMatch[matchId] || []).sort((a,b) => +a.minute - +b.minute);
  const cardsEl = document.getElementById('m-cards');
  if (matchCards.length === 0) {
    cardsEl.innerHTML = '<div style="color:#6B7280;font-size:13px;padding:4px 8px">Sin tarjetas registradas</div>';
  } else {
    cardsEl.innerHTML = matchCards.map(c => {
      const player = DB.players[c.player_id];
      const playerName = player?.player_name || (c.player_id ? c.player_id : 'Desconocido');
      const team = c.team_id == m.home_team_id ? m.home_team_name : m.away_team_name;
      const icon = c.is_red == '1' ? '🟥' : c.is_second_yellow == '1' ? '🟨🟥' : '🟨';
      return `<div class="event-item"><span class="min">${c.minute}'</span><span class="icon">${icon}</span><span>${playerName}</span><span class="team-tag">${team||''}</span></div>`;
    }).join('');
  }

  // Lineups
  const matchLineups = DB.lineupsByMatch[matchId] || [];
  const homeLineup = matchLineups.filter(l => l.team_id == m.home_team_id);
  const awayLineup = matchLineups.filter(l => l.team_id == m.away_team_id);

  // Build goal/card lookup by player_id for this match
  const goalCountByPlayer = {};
  (DB.goalsByMatch[matchId] || []).forEach(g => {
    if (g.is_own_goal === '1') return;
    goalCountByPlayer[g.player_id] = (goalCountByPlayer[g.player_id] || 0) + 1;
  });

  const cardsByPlayer = {};
  (DB.cardsByMatch[matchId] || []).forEach(c => {
    if (!cardsByPlayer[c.player_id]) cardsByPlayer[c.player_id] = [];
    cardsByPlayer[c.player_id].push(c);
  });

  // Build substitution map: who came in for whom and at what minute
  const subInByPlayer = {};  // player_id -> entry_minute (suplente que entra)
  const subOutByPlayer = {}; // player_id -> exit_minute  (titular que sale)

  const allLineup = [...(DB.lineupsByMatch[matchId] || [])];
  allLineup.forEach(l => {
    const entryMin = +l.entry_minute;
    const exitMin  = +l.exit_minute;
    const isStarter = l.is_starter === 'True' || l.is_starter === '1' || l.is_starter === true;
    if (!isStarter && entryMin > 0) subInByPlayer[l.player_id] = entryMin;
    if (isStarter && exitMin > 0 && exitMin < 95) subOutByPlayer[l.player_id] = exitMin;
  });

  function lineupHtml(lineup, teamName) {
    if (!lineup.length) return `<div style="color:#6B7280;font-size:12px">Sin datos</div>`;
    const starters = lineup.filter(l => l.is_starter === 'True' || l.is_starter === '1' || l.is_starter === true).sort((a,b) => +a.jersey_number - +b.jersey_number);
    const subs = lineup.filter(l => l.is_starter !== 'True' && l.is_starter !== '1' && l.is_starter !== true).sort((a,b) => +a.jersey_number - +b.jersey_number);

    const playerRow = (l, isSub) => {
      const p = DB.players[l.player_id];
      const name = p?.player_name || l.player_id || '-';

      // Icons: goals and cards
      let icons = '';
      const goals = goalCountByPlayer[l.player_id] || 0;
      if (goals > 0) icons += '⚽'.repeat(goals);
      const cards = cardsByPlayer[l.player_id] || [];
      cards.forEach(c => {
        if (c.is_red === '1') icons += '🟥';
        else if (c.is_second_yellow === '1') icons += '🟨🟥';
        else icons += '🟨';
      });

      // Substitution indicator
      let subHtml = '';
      if (!isSub && subOutByPlayer[l.player_id]) {
        subHtml = `<span class="sub-out">↓</span><span class="sub-min">${subOutByPlayer[l.player_id]}'</span>`;
      } else if (isSub && subInByPlayer[l.player_id]) {
        subHtml = `<span class="sub-in">↑</span><span class="sub-min">${subInByPlayer[l.player_id]}'</span>`;
      }

      return `<div class="lineup-player ${isSub?'sub':''}">
        <span class="num">${l.jersey_number||'-'}</span>
        <span class="player-name">${name}</span>
        <span class="player-icons">${icons}${subHtml}</span>
      </div>`;
    };

    return `<h4>${teamName}</h4>
      ${starters.map(l => playerRow(l, false)).join('')}
      ${subs.length ? `<div style="font-size:11px;color:#6B7280;margin:6px 0 4px;padding-left:6px">Suplentes</div>${subs.map(l => playerRow(l, true)).join('')}` : ''}`;
  }

  document.getElementById('m-lineup').innerHTML =
    `<div class="lineup-col">${lineupHtml(homeLineup, m.home_team_name||'Local')}</div>
     <div class="lineup-col">${lineupHtml(awayLineup, m.away_team_name||'Visitante')}</div>`;

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('modal-overlay').classList.remove('open');
}

// ── Resúmenes ──
function renderResumenes() {
  const rEtapa = document.getElementById('r-etapa')?.value || '';
  const rProvincia = document.getElementById('r-provincia')?.value || '';
  const compKey = document.getElementById('r-competition').value;
  const teamFilter = (document.getElementById('r-team-filter').value || '').toLowerCase();
  const container = document.getElementById('resumenes-content');

  if (!compKey) {
    container.innerHTML = '<div class="empty-state">Selecciona una competición para ver los resúmenes</div>';
    return;
  }

  // Standings
  let standings = DB.standings.filter(s => s.competition_key === compKey);
  if (teamFilter) standings = standings.filter(s => s.team_name.toLowerCase().includes(teamFilter));
  standings.sort((a,b) => +a.rank - +b.rank);

  // Top scorers
  let scorers = DB.scorers.filter(s => s.competition_key === compKey);
  if (teamFilter) scorers = scorers.filter(s => s.team_name.toLowerCase().includes(teamFilter));
  scorers.sort((a,b) => +b.goals - +a.goals);
  scorers = scorers.slice(0, 20);

  // Recent results
  let results = DB.results.filter(r => r.competition_key === compKey);
  if (teamFilter) results = results.filter(r =>
    r.home_team_name.toLowerCase().includes(teamFilter) ||
    r.away_team_name.toLowerCase().includes(teamFilter)
  );
  results.sort((a,b) => b.match_date.localeCompare(a.match_date));
  const recentResults = results.slice(0, 10);

  let html = '';

  // Stats summary
  if (standings.length) {
    const totalGames = standings.reduce((s,t) => s + +t.played, 0) / 2;
    const totalGoals = standings.reduce((s,t) => s + +t.goals_for, 0) / 2;
    html += `<div class="stats-row">
      <div class="stat-card"><div class="val">${standings.length}</div><div class="lbl">Equipos</div></div>
      <div class="stat-card"><div class="val">${Math.round(totalGames)}</div><div class="lbl">Partidos</div></div>
      <div class="stat-card"><div class="val">${Math.round(totalGoals)}</div><div class="lbl">Goles</div></div>
      <div class="stat-card"><div class="val">${totalGames > 0 ? (totalGoals/totalGames).toFixed(1) : '-'}</div><div class="lbl">Goles/partido</div></div>
    </div>`;
  }

  // Standings table
  if (standings.length) {
    html += `<div class="section-card">
      <div class="section-card-header">📊 Clasificación</div>
      <table>
        <thead><tr>
          <th>#</th><th>Equipo</th>
          <th class="num">PJ</th><th class="num">G</th><th class="num">E</th><th class="num">P</th>
          <th class="num">GF</th><th class="num">GC</th><th class="num">DG</th>
          <th class="num">Pts</th><th>Forma</th>
        </tr></thead>
        <tbody>
          ${standings.map(t => `<tr class="${isRomo(t.team_name)?'romo-row':''}">
            <td><span class="rank-num ${t.rank<=3?'rank-'+t.rank:''}">${t.rank}</span></td>
            <td><div class="team-with-crest"><img src="${t.crest_url||''}" onerror="this.style.display='none'" style="width:20px;height:20px;object-fit:contain"><span>${t.team_name}</span></div></td>
            <td class="num">${t.played}</td>
            <td class="num">${t.won}</td>
            <td class="num">${t.drawn}</td>
            <td class="num">${t.lost}</td>
            <td class="num">${t.goals_for}</td>
            <td class="num">${t.goals_against}</td>
            <td class="num">${t.goal_diff > 0 ? '+'+t.goal_diff : t.goal_diff}</td>
            <td class="num bold">${t.points}</td>
            <td><div class="form-badges">${(t.form||'').split('').map(f => `<span class="form-badge ${f}">${f==='W'?'V':f==='D'?'E':'D'}</span>`).join('')}</div></td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }

  // Top scorers
  if (scorers.length) {
    html += `<div class="section-card">
      <div class="section-card-header">⚽ Máximos goleadores</div>
      <table>
        <thead><tr>
          <th>#</th><th>Jugador</th><th>Equipo</th>
          <th class="num">Goles</th><th class="num">Pen.</th><th class="num">P.P.</th>
        </tr></thead>
        <tbody>
          ${scorers.map((s,i) => `<tr class="${isRomo(s.team_name)?'romo-row':''}">
            <td class="rank-num">${i+1}</td>
            <td>${s.player_name}</td>
            <td><div class="team-with-crest"><img src="${s.crest_url||''}" onerror="this.style.display='none'" style="width:20px;height:20px;object-fit:contain"><span>${s.team_name}</span></div></td>

            <td class="num">${s.penalties||0}</td>
            <td class="num">${s.own_goals||0}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }

  // Recent results
  if (recentResults.length) {
    html += `<div class="section-card">
      <div class="section-card-header">🕐 Últimos resultados</div>
      <div style="padding:12px">
        ${recentResults.map(m => `
          <div class="match-card${isRomo(m.home_team_name)||isRomo(m.away_team_name)?' romo-match':''}" onclick="openModal('${m.match_id}')" style="margin-bottom:6px">

            <div class="score-box"><span>${m.home_score??'-'}</span><span class="sep">:</span><span>${m.away_score??'-'}</span></div>
            <div class="team-cell away"><img src="${m.away_crest_url||''}" onerror="this.style.display='none'"><span>${m.away_team_name}</span></div>
            <div></div>
          </div>`).join('')}
      </div>
    </div>`;
  }

  if (!html) {
    html = '<div class="empty-state">No hay datos para esta competición</div>';
  }

  container.innerHTML = html;
}

    if (gProvincia) cards = cards.filter(c => DB.competitions[c.competition_key]?.provincia === gProvincia);
  }

  // Stats
  const totalMatches = results.length;
  const totalGoals = results.reduce((s,m) => s + (+m.home_score||0) + (+m.away_score||0), 0);
  const totalCards = cards.length;
  const avgGoals = totalMatches > 0 ? (totalGoals / totalMatches).toFixed(2) : 0;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card"><div class="val">${totalMatches.toLocaleString()}</div><div class="lbl">Partidos</div></div>
    <div class="stat-card"><div class="val">${totalGoals.toLocaleString()}</div><div class="lbl">Goles totales</div></div>
    <div class="stat-card"><div class="val">${avgGoals}</div><div class="lbl">Goles/partido</div></div>
    <div class="stat-card"><div class="val">${totalCards.toLocaleString()}</div><div class="lbl">Tarjetas</div></div>
  `;

  const grid = document.getElementById('charts-grid');
  grid.innerHTML = `
    <div class="chart-card"><h3>Resultados por jornada</h3><p>Goles marcados por jornada · <em>click en barra para filtrar</em></p><canvas id="ch-goals-round"></canvas><div class="chart-drill-table" id="drill-goals-round"></div></div>
    <div class="chart-card"><h3>Distribución de resultados</h3><p>Victorias locales, empates y victorias visitantes</p><canvas id="ch-results"></canvas></div>
    <div class="chart-card"><h3>Top 15 goleadores</h3><p>${compKey ? 'En esta competición' : 'Global'} · <em>click en barra para filtrar</em></p><canvas id="ch-scorers"></canvas><div class="chart-drill-table" id="drill-scorers"></div></div>
    <div class="chart-card"><h3>Tarjetas por tipo</h3><p>Amarillas, rojas y dobles amarillas</p><canvas id="ch-cards"></canvas></div>
    <div class="chart-card"><h3>Goles por minuto</h3><p>Distribución de goles a lo largo del partido · <em>click en barra para filtrar</em></p><canvas id="ch-goals-min"></canvas><div class="chart-drill-table" id="drill-goals-min"></div></div>
    <div class="chart-card"><h3>Top 10 equipos goleadores</h3><p>Equipos que más goles han marcado · <em>click en barra para filtrar</em></p><canvas id="ch-teams"></canvas><div class="chart-drill-table" id="drill-teams"></div></div>
  `;

  const DL_VERT = { anchor:'end', align:'end', color:'#374151', font:{weight:'700',size:11}, formatter: v => v > 0 ? v : '' };
  const DL_HORIZ = { anchor:'end', align:'end', color:'#374151', font:{weight:'700',size:10}, clip:false, formatter: v => v > 0 ? v : '' };

  // 1. Goals per round
  const goalsByRound = {};
  results.forEach(m => {
    const w = m.match_week;
    if (!w) return;
    if (!goalsByRound[w]) goalsByRound[w] = 0;
    goalsByRound[w] += (+m.home_score||0) + (+m.away_score||0);
  });
  const rounds = Object.keys(goalsByRound).map(Number).sort((a,b) => a-b);
  charts.goalsRound = new Chart(document.getElementById('ch-goals-round'), {
    type: 'bar',
    data: {
      labels: rounds.map(r => `J${r}`),
      datasets: [{ label: 'Goles', data: rounds.map(r => goalsByRound[r]),
        backgroundColor: '#D2001C', borderRadius: 4 }]
    },
    options: {
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const idx = elements[0].index;
        const jornada = rounds[idx];
        const el = document.getElementById('drill-goals-round');
        if (el._last === String(jornada)) { el.innerHTML = ''; el._last = null; return; }
        el._last = String(jornada);
        const ms = results.filter(r => r.match_week == jornada).sort((a,b)=>(a.match_date||'').localeCompare(b.match_date||''));
        el.innerHTML = drillHeader(`Jornada ${jornada} — ${ms.length} partidos`, 'drill-goals-round') + matchDrillHtml(ms);
      },
      plugins: { legend:{ display:false }, datalabels: DL_VERT },
      scales: { y: { beginAtZero: true } }
    }
  });

  // 2. Results distribution
  let wins = 0, draws = 0, losses = 0;
  results.forEach(m => {
    const hs = +m.home_score, as = +m.away_score;
    if (isNaN(hs) || isNaN(as)) return;
    if (hs > as) wins++;
    else if (hs === as) draws++;
    else losses++;
  });
  charts.results = new Chart(document.getElementById('ch-results'), {
    type: 'doughnut',
    data: {
      labels: ['Victoria local', 'Empate', 'Victoria visitante'],
      datasets: [{ data: [wins, draws, losses],
        backgroundColor: ['#D2001C', '#6B7280', '#374151'],
        borderWidth: 0 }]
    },
    options: { plugins: { legend: { position: 'bottom' }, datalabels: { display: false } } }
  });

  // 3. Top scorers
  const scorerMap = {};
  goals.forEach(g => {
    if (!g.scorer_player_id || g.is_own_goal === '1') return;
    if (!scorerMap[g.scorer_player_id]) scorerMap[g.scorer_player_id] = 0;
    scorerMap[g.scorer_player_id]++;
  });
  const scorerTeam = {};
  DB.scorers.forEach(s => { if (s.player_name) scorerTeam[s.player_name] = s.team_name; });
  const topScorers = Object.entries(scorerMap)
    .sort((a,b) => b[1]-a[1]).slice(0,15)
    .map(([id, gls]) => { const name = DB.players[id]?.player_name || id; return { id, name, goals: gls, team: scorerTeam[name] || '' }; });
  charts.scorers = new Chart(document.getElementById('ch-scorers'), {
    type: 'bar',
    data: {
      labels: topScorers.map(s => s.name.split(',')[0]),
      datasets: [{ label: 'Goles', data: topScorers.map(s => s.goals),
        backgroundColor: topScorers.map(s => isRomo(s.team) ? '#F59E0B' : '#D2001C'), borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y',
      clip: false,
      layout: { padding: { right: 30 } },
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const idx = elements[0].index;
        const scorer = topScorers[idx];
        const el = document.getElementById('drill-scorers');
        if (el._last === scorer.id) { el.innerHTML = ''; el._last = null; return; }
        el._last = scorer.id;
        const gs = goals.filter(g => g.scorer_player_id == scorer.id && g.is_own_goal !== '1').sort((a,b)=>+a.minute-+b.minute);
        el.innerHTML = drillHeader(`${scorer.name.split(',')[0]} — ${gs.length} goles`, 'drill-scorers') + goalsDrillHtml(gs);
      },
      plugins: { legend:{ display:false }, datalabels: DL_HORIZ },
      scales: { x: { beginAtZero: true } }
    }
  });

  // 4. Cards breakdown
  const yellows = cards.filter(c => c.is_yellow === '1' && c.is_second_yellow !== '1').length;
  const reds = cards.filter(c => c.is_red === '1' && c.is_second_yellow !== '1').length;
  const secondYellow = cards.filter(c => c.is_second_yellow === '1').length;
  charts.cards = new Chart(document.getElementById('ch-cards'), {
    type: 'pie',
    data: {
      labels: ['Amarillas', 'Rojas directas', 'Doble amarilla'],
      datasets: [{ data: [yellows, reds, secondYellow],
        backgroundColor: ['#F59E0B', '#111111', '#F97316'],
        borderWidth: 0 }]
    },
    options: { plugins: { legend: { position: 'bottom' }, datalabels: { display: false } } }
  });

  // 5. Goals by minute range
  const minuteBuckets = { '1-15':0,'16-30':0,'31-45':0,'46-60':0,'61-75':0,'76-90':0,'90+':0 };
  goals.forEach(g => {
    const min = +g.minute;
    if (isNaN(min)) return;
    if (min <= 15) minuteBuckets['1-15']++;
    else if (min <= 30) minuteBuckets['16-30']++;
    else if (min <= 45) minuteBuckets['31-45']++;
    else if (min <= 60) minuteBuckets['46-60']++;
    else if (min <= 75) minuteBuckets['61-75']++;
    else if (min <= 90) minuteBuckets['76-90']++;
    else minuteBuckets['90+']++;
  });
  const minRangeKeys = Object.keys(minuteBuckets);
  const minRangeMap = {'1-15':[0,15],'16-30':[16,30],'31-45':[31,45],'46-60':[46,60],'61-75':[61,75],'76-90':[76,90],'90+':[91,999]};
  charts.goalsMin = new Chart(document.getElementById('ch-goals-min'), {
    type: 'bar',
    data: {
      labels: minRangeKeys,
      datasets: [{ label: 'Goles', data: Object.values(minuteBuckets),
        backgroundColor: '#D2001C', borderRadius: 4 }]
    },
    options: {
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const idx = elements[0].index;
        const rangeKey = minRangeKeys[idx];
        const el = document.getElementById('drill-goals-min');
        if (el._last === rangeKey) { el.innerHTML = ''; el._last = null; return; }
        el._last = rangeKey;
        const [lo, hi] = minRangeMap[rangeKey];
        const gs = goals.filter(g => { const m=+g.minute; return m>=lo && m<=hi; }).sort((a,b)=>+a.minute-+b.minute);
        el.innerHTML = drillHeader(`Minuto ${rangeKey} — ${gs.length} goles`, 'drill-goals-min') + goalsDrillHtml(gs);
      },
      plugins: { legend:{ display:false }, datalabels: DL_VERT },
      scales: { y: { beginAtZero: true } }
    }
  });

  // 6. Top scoring teams
  const teamGoals = {};
  results.forEach(m => {
    if (!teamGoals[m.home_team_name]) teamGoals[m.home_team_name] = 0;
    if (!teamGoals[m.away_team_name]) teamGoals[m.away_team_name] = 0;
    teamGoals[m.home_team_name] += (+m.home_score||0);
    teamGoals[m.away_team_name] += (+m.away_score||0);
  });
  const topTeams = Object.entries(teamGoals)
    .filter(([n]) => n)
    .sort((a,b) => b[1]-a[1]).slice(0,10);
  charts.teams = new Chart(document.getElementById('ch-teams'), {
    type: 'bar',
    data: {
      labels: topTeams.map(t => t[0]),
      datasets: [{ label: 'Goles marcados', data: topTeams.map(t => t[1]),
        backgroundColor: topTeams.map(t => isRomo(t[0]) ? '#F59E0B' : '#D2001C'), borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y',
      clip: false,
      layout: { padding: { right: 30 } },
      onClick: (evt, elements) => {
        if (!elements.length) return;
        const idx = elements[0].index;
        const teamName = topTeams[idx][0];
        const el = document.getElementById('drill-teams');
        if (el._last === teamName) { el.innerHTML = ''; el._last = null; return; }
        el._last = teamName;
        const ms = results.filter(r => r.home_team_name === teamName || r.away_team_name === teamName).sort((a,b)=>(a.match_date||'').localeCompare(b.match_date||''));
        el.innerHTML = drillHeader(`${teamName} — ${ms.length} partidos`, 'drill-teams') + matchDrillHtml(ms);
      },
      plugins: { legend:{ display:false }, datalabels: DL_HORIZ },
      scales: { x: { beginAtZero: true } }
    }
  });
}

// ── Categorías ──
const CATEGORIAS_NAMES = ['cadete honor bizkaia', 'liga vasca juvenil'];
const CATEGORIAS_LABELS = ['CADETE HONOR BIZKAIA', 'LIGA VASCA JUVENIL'];
let catSelectedIdx = 0;
let catSubTab = 'actas';
let catActasPage = 1;
let catActasTeam = null;      // null=no inicializado, ''=todos, string=equipo concreto
const CAT_ACTAS_PAGE_SIZE = 20;
let catDashPlayerSearch = '';   // texto de búsqueda de jugador en el dashboard
let catEqTopN = 0;              // 0 = todos los equipos en gráficas de datos equipos
let catDashTeam = 'ROMO F.C.';  // equipo seleccionado en el dashboard
let catDashMis = false;         // botón "MIS JUGADORES" (solo Romo)
let catDashSelectedId = '';     // jugador seleccionado en el dashboard
let catDashFocus = false;       // restaurar foco en el buscador tras re-render
let catGrafTeam = '';           // equipo seleccionado en el subtab gráficas

// ── Filtros del subtab "Ranking jugadores" ──
let catRankTeam = 'ROMO F.C.'; // equipo seleccionado (team_name)
let catRankPlayerQ = '';   // texto de búsqueda de jugador
let catRankMis = false;    // (no usado en UI, conservado por compatibilidad)
let catRankFocus = false;  // restaurar foco en el input tras re-render
let catCompareMode = false; // modo comparación de 2 jugadores
let catRankTeam2 = '';      // equipo del jugador 2
let catRankPlayerQ2 = '';   // jugador 2 seleccionado

const CAT_MAIN_TABS = [
  { key: 'equipos-tab',   label: '🛡️ EQUIPOS' },
  { key: 'jugadores-tab', label: '👤 JUGADORES' },
];
const CAT_SUBTABS = [
  { key: 'actas',         label: '📋 Actas',              group: 'equipos-tab' },
  { key: 'equipos',       label: '🛡️ Datos equipos',      group: 'equipos-tab' },
  { key: 'graficas',      label: '📈 Gráficas',           group: 'equipos-tab' },
  { key: 'ranking',       label: '🏅 Ranking jugadores',  group: 'jugadores-tab' },
  { key: 'dashboard',     label: '👤 Dashboard jugador',  group: 'jugadores-tab' },
];
let catMainTab = 'equipos-tab';

function selectCategoria(idx) {
  catSelectedIdx = idx;
  catActasPage = 1;
  catActasTeam = null;  // resetear para que ROMO se detecte en la nueva competición
  renderCategorias();
}

function selectCatMainTab(mainKey) {
  catMainTab = mainKey;
  const first = CAT_SUBTABS.find(t => t.group === mainKey);
  if (first) catSubTab = first.key;
  catActasPage = 1;
  renderCategorias();
}

function selectCatSubTab(key) {
  const tab = CAT_SUBTABS.find(t => t.key === key);
  if (tab) catMainTab = tab.group;
  catSubTab = key;
  catActasPage = 1;
  renderCategorias();
}

function renderCategorias() {
  Object.values(catCharts).forEach(c => c.destroy());
  catCharts = {};

  // Two-level tab bar
  const bar = document.getElementById('cat-subtabs-bar');
  if (bar) {
    const visibleSubtabs = CAT_SUBTABS.filter(t => t.group === catMainTab);
    bar.innerHTML = `
      <div style="display:flex;flex-direction:column;width:100%">
        <div style="display:flex;border-bottom:2px solid var(--gray-200);background:#F9FAFB">
          ${CAT_MAIN_TABS.map(mt => {
            const active = mt.key === catMainTab;
            return `<button onclick="selectCatMainTab('${mt.key}')" style="
              padding:12px 22px;font-size:14px;font-weight:700;border:none;
              border-bottom:3px solid ${active?'#D2001C':'transparent'};
              background:${active?'white':'transparent'};
              color:${active?'#D2001C':'#6B7280'};cursor:pointer;white-space:nowrap;
              transition:all .15s;letter-spacing:.5px;margin-bottom:-2px
            ">${mt.label}</button>`;
          }).join('')}
        </div>
        <div style="display:flex;border-bottom:1px solid var(--gray-200);background:white;padding-left:8px">
          ${visibleSubtabs.map(t => {
            const active = t.key === catSubTab;
            return `<button onclick="selectCatSubTab('${t.key}')" style="
              padding:10px 16px;font-size:13px;font-weight:${active?'600':'500'};border:none;
              border-bottom:2px solid ${active?'#D2001C':'transparent'};
              background:none;color:${active?'#D2001C':'#6B7280'};cursor:pointer;
              white-space:nowrap;transition:all .15s;margin-bottom:-1px
            ">${t.label}</button>`;
          }).join('')}
        </div>
      </div>`;
  }

  const allComps = DB.competitionList.filter(c =>
    CATEGORIAS_NAMES.some(t => c.name.toLowerCase().includes(t))
  );
  const comp = allComps.find(c => c.name.toLowerCase().includes(CATEGORIAS_NAMES[catSelectedIdx]));
  const el = document.getElementById('categorias-content');

  if (!comp) {
    el.innerHTML = '<div class="empty-state">No se encontraron las competiciones configuradas.</div>';
    return;
  }

  const k = comp.key;
  const standings = DB.standings.filter(s => s.competition_key === k).sort((a,b) => +a.rank - +b.rank);
  const scorers   = DB.scorers.filter(s => s.competition_key === k).sort((a,b) => +b.goals - +a.goals);
  const results   = DB.results.filter(r => r.competition_key === k).sort((a,b) => {
    const wDiff = (+a.match_week || 0) - (+b.match_week || 0);
    if (wDiff !== 0) return wDiff;
    return (a.match_date || '').localeCompare(b.match_date || '');
  });
  const goals     = DB.goals.filter(g => g.competition_key === k);
  const cards     = DB.cards.filter(c => c.competition_key === k);
  const totalGames = results.length;
  const totalGoals = results.reduce((s,m) => s + (+m.home_score||0) + (+m.away_score||0), 0);
  const avgGoals   = totalGames > 0 ? (totalGoals / totalGames).toFixed(2) : '-';

  // Stats summary bar
  const summaryHtml = `
    <div style="display:flex;justify-content:flex-end;margin-bottom:6px">
      <button onclick="(function(btn){var row=btn.closest('div').nextElementSibling;var hidden=row.style.display==='none';row.style.display=hidden?'':'none';btn.textContent=hidden?'Ocultar resumen':'Mostrar resumen';})(this)"
        style="font-size:12px;padding:4px 12px;border:1px solid #ccc;border-radius:6px;background:#f5f5f5;cursor:pointer;color:#555">
        Ocultar resumen
      </button>
    </div>
    <div class="stats-row" style="margin-bottom:20px">
      <div class="stat-card"><div class="val">${standings.length||'—'}</div><div class="lbl">Equipos</div></div>
      <div class="stat-card"><div class="val">${totalGames||'—'}</div><div class="lbl">Partidos</div></div>
      <div class="stat-card"><div class="val">${totalGoals}</div><div class="lbl">Goles</div></div>
      <div class="stat-card"><div class="val">${avgGoals}</div><div class="lbl">Goles/partido</div></div>
      <div class="stat-card"><div class="val">${cards.length}</div><div class="lbl">Tarjetas</div></div>
    </div>`;

  if (catSubTab === 'clasificacion') {
    el.innerHTML = summaryHtml + `
      <div class="section-card">
        <div class="section-card-header">📊 Clasificación — ${comp.name}</div>
        <table>
          <thead><tr>
            <th>#</th><th>Equipo</th>
            <th class="num">PJ</th><th class="num">G</th><th class="num">E</th><th class="num">P</th>
            <th class="num">GF</th><th class="num">GC</th><th class="num">DG</th>
            <th class="num">Pts</th><th>Forma</th>
          </tr></thead>
          <tbody>
            ${standings.map(t => `<tr class="${isRomo(t.team_name)?'romo-row':''}">
              <td><span class="rank-num ${t.rank<=3?'rank-'+t.rank:''}">${t.rank}</span></td>
              <td><div class="team-with-crest"><img src="${t.crest_url||''}" onerror="this.style.display='none'" style="width:20px;height:20px;object-fit:contain"><span>${t.team_name}${isRomo(t.team_name)?'<span style="margin-left:6px;font-size:10px;background:#F59E0B;color:#111;padding:1px 6px;border-radius:4px;font-weight:700">ROMO</span>':''}</span></div></td>
              <td class="num">${t.played}</td><td class="num">${t.won}</td><td class="num">${t.drawn}</td><td class="num">${t.lost}</td>
              <td class="num">${t.goals_for}</td><td class="num">${t.goals_against}</td>
              <td class="num">${t.goal_diff > 0 ? '+'+t.goal_diff : t.goal_diff}</td>
              <td class="num bold">${t.points}</td>
              <td><div class="form-badges">${(t.form||'').split('').map(f=>`<span class="form-badge ${f}">${f==='W'?'V':f==='D'?'E':'D'}</span>`).join('')}</div></td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>`;
    return;
  }

  if (catSubTab === 'actas') {
    const esc = (s) => String(s).replace(/"/g, '&quot;');
    // Equipos únicos de la competición
    const teamNamesActas = [...new Set(results.flatMap(m => [m.home_team_name, m.away_team_name]).filter(Boolean))].sort((a,b) => a.localeCompare(b));
    // Inicializar con ROMO solo la primera vez (null); si el usuario eligió '' (todos) o un equipo, respetar
    if (catActasTeam === null || (catActasTeam !== '' && !teamNamesActas.includes(catActasTeam))) {
      catActasTeam = teamNamesActas.find(n => isRomo(n)) || '';
    }
    let filtered = results;
    if (catActasTeam) filtered = filtered.filter(m =>
      m.home_team_name === catActasTeam || m.away_team_name === catActasTeam
    );
    const total = filtered.length;
    const pages = Math.ceil(total / CAT_ACTAS_PAGE_SIZE);
    const slice = filtered.slice((catActasPage-1)*CAT_ACTAS_PAGE_SIZE, catActasPage*CAT_ACTAS_PAGE_SIZE);

    const paginationHtml = pages > 1 ? `<div style="display:flex;gap:6px;align-items:center;justify-content:center;padding:12px 0">
      ${catActasPage > 1 ? `<button class="btn secondary" onclick="catActasPage--;renderCategorias()">← Anterior</button>` : ''}
      <span style="font-size:13px;color:#6B7280">Página ${catActasPage} / ${pages} (${total} partidos)</span>
      ${catActasPage < pages ? `<button class="btn secondary" onclick="catActasPage++;renderCategorias()">Siguiente →</button>` : ''}
    </div>` : `<div style="padding:8px 0;font-size:13px;color:#6B7280">${total} partidos</div>`;

    el.innerHTML = summaryHtml + `
      <div class="section-card">
        <div class="section-card-header">📋 Actas — ${comp.name}</div>
        <div style="padding:12px;border-bottom:1px solid var(--gray-200);display:flex;gap:10px;align-items:center">
          <select id="cat-actas-team" onchange="catActasTeam=this.value;catActasPage=1;renderCategorias()"
            style="padding:7px 12px;border:1px solid var(--gray-300);border-radius:6px;font-size:13px;min-width:240px;max-width:320px">
            <option value="">— Todos los equipos —</option>
            ${teamNamesActas.map(n => `<option value="${esc(n)}" ${n===catActasTeam?'selected':''}>${n}</option>`).join('')}
          </select>
        </div>
        ${paginationHtml}
        <div style="padding:8px 12px">
          ${(() => {
            const byWeek = {};
            slice.forEach(m => {
              const w = m.match_week != null && m.match_week !== '' ? m.match_week : '—';
              if (!byWeek[w]) byWeek[w] = [];
              byWeek[w].push(m);
            });
            const weeks = Object.keys(byWeek).sort((a, b) => {
              const na = parseFloat(a), nb = parseFloat(b);
              if (isNaN(na) || isNaN(nb)) return String(a).localeCompare(String(b));
              return na - nb;
            });
            return weeks.map(w => `
              <div class="jornada-group">
                <div class="jornada-header">
                  Jornada ${w}
                  <span class="jornada-count">${byWeek[w].length} partido${byWeek[w].length !== 1 ? 's' : ''}</span>
                </div>
                ${byWeek[w].map(m => `
                  <div class="match-card${isRomo(m.home_team_name)||isRomo(m.away_team_name)?' romo-match':''}" onclick="openModal('${m.match_id}')">
                    <div class="match-meta"><strong>${m.match_date ? new Date(m.match_date).toLocaleDateString('es-ES',{day:'2-digit',month:'short'}) : ''}</strong> J${m.match_week||'-'}</div>

  if (catSubTab === 'ranking') {
